services:
  app:
    build:
      context: ./cur10us
      dockerfile: Dockerfile
    image: cur10us-app
    ports:
      - "3000:3000"
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      WS_SERVER_URL: ws://localhost:3001
    secrets:
      - auth_secret
      - google_client_id
      - google_client_secret
      - resend_api_key
    volumes:
      - app_uploads:/app/public/uploads
      - app_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: cur10usx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

secrets:
  auth_secret:
    file: ./secrets/auth_secret.txt
  google_client_id:
    file: ./secrets/google_client_id.txt
  google_client_secret:
    file: ./secrets/google_client_secret.txt
  resend_api_key:
    file: ./secrets/resend_api_key.txt

volumes:
  app_uploads:
    driver: local
  app_logs:
    driver: local
  redis_data:
    driver: local
